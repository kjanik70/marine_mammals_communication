# Audio: Tiny model (6.3M) on ALL audio — reduced overfitting via smaller model
model:
  preset: tiny
  vocab_size: 1026
  max_seq_len: 512
  dropout: 0.15

data:
  dataset_type: audio
  token_dir: data/tokenized/all
  max_seq_len: 512
  augment: true
  token_noise_prob: 0.05
  token_mask_prob: 0.02
  time_stretch_prob: 0.3

training:
  learning_rate: 5.0e-4
  weight_decay: 0.1
  batch_size: 64
  num_epochs: 200
  warmup_steps: 300
  min_lr_ratio: 0.01
  log_interval: 10
  eval_interval: 100
  save_interval: 500
  patience: 30
  output_dir: runs/audio_tiny_all

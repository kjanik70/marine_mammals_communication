# Audio Track 2: Small model on DSWP audio tokens (first codebook)
model:
  preset: small
  vocab_size: 1026    # 1024 codebook + PAD(0) + offset(1)
  max_seq_len: 512

data:
  dataset_type: audio
  token_dir: data/tokenized/dswp
  max_seq_len: 512

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  batch_size: 16
  num_epochs: 200
  warmup_steps: 100
  log_interval: 10
  eval_interval: 50
  save_interval: 200
  patience: 30
  output_dir: runs/audio_small_dswp

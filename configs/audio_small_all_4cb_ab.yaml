# Audio: Small model on ALL audio — 4 codebooks, quality filtered (grade A+B only)
model:
  preset: small
  vocab_size: 4099    # 4*1024 + 2 (PAD+offset) + 1 (SEP)
  max_seq_len: 1024
  dropout: 0.15

data:
  dataset_type: audio
  token_dir: data/tokenized/all_4cb_ab
  max_seq_len: 1024
  n_codebooks: 4
  concat: true
  sep_token: 4098     # N_CODEBOOKS * 1024 + 2
  augment: true
  token_noise_prob: 0.05
  token_mask_prob: 0.02
  time_stretch_prob: 0.3

training:
  learning_rate: 2.0e-4
  weight_decay: 0.15
  batch_size: 8
  num_epochs: 200
  warmup_steps: 400
  min_lr_ratio: 0.01
  log_interval: 10
  eval_interval: 100
  save_interval: 500
  patience: 30
  output_dir: runs/audio_small_all_4cb_ab

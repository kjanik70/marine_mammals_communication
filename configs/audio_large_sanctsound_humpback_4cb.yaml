# Audio: Large model on SanctSound Hawaii humpback whale data
# Stations: hi01, hi03, hi04, hi05 — high-detection hours only
# Pipeline B: bandpass → normalize → loudness norm (no spectral gating)
# Whale-band variability filter (CV > 0.8) to keep only vocalization chunks
model:
  preset: large
  vocab_size: 4099    # 4*1024 + 2 (PAD+offset) + 1 (SEP)
  max_seq_len: 4096
  dropout: 0.15

data:
  dataset_type: audio
  token_dir: data/tokenized/sanctsound_humpback_4cb
  max_seq_len: 4096
  n_codebooks: 4
  concat: true
  sep_token: 4098     # N_CODEBOOKS * 1024 + 2
  augment: true
  token_noise_prob: 0.05
  token_mask_prob: 0.02
  time_stretch_prob: 0.3

training:
  learning_rate: 1.5e-4
  weight_decay: 0.15
  batch_size: 8
  num_epochs: 200
  warmup_steps: 400
  min_lr_ratio: 0.01
  log_interval: 50
  eval_interval: 1000
  save_interval: 2000
  patience: 30
  output_dir: runs/audio_large_sanctsound_humpback_4cb

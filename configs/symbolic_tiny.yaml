# Symbolic Track 1: Tiny model on individual coda sequences
model:
  preset: tiny
  vocab_size: 74
  max_seq_len: 128

data:
  codas_csv: data/raw/ceti/DominicaCodas.csv
  dialogues_csv: data/raw/ceti/sperm-whale-dialogues.csv
  dataset_type: coda  # "coda" for individual sequences, "dialogue" for multi-whale
  max_seq_len: 128

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  batch_size: 32
  num_epochs: 200
  warmup_steps: 50
  log_interval: 10
  eval_interval: 50
  save_interval: 200
  patience: 30
  output_dir: runs/symbolic_tiny_coda
